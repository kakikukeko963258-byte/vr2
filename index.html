<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <!-- モバイル向けの基本設定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>360° VR EXR Viewer</title>

    <!-- ★ iPhoneで全画面（アドレスバー非表示）にするための設定 ★ -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VR Viewer">

    <style>
        /* htmlとbodyを完全に固定し、iOS特有のスクロールの「バウンス（弾む動き）」を徹底排除 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-text-size-adjust: 100%;
        }
        
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        /* 画面中央のセンターライン（VRゴーグルの合わせ用） */
        #center-line {
            position: absolute;
            top: 0;
            left: 50%;
            width: 1px;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            z-index: 5;
            pointer-events: none;
            display: none;
        }
        
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.5s ease;
        }
        
        .btn {
            background: #007aff;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.4);
            margin-top: 20px;
        }
        
        #ui-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 90%;
            max-width: 360px;
            transition: opacity 0.4s ease;
        }
        
        .file-label {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            text-align: center;
        }
        
        #file-input {
            display: none;
        }
        
        .control-box {
            width: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 14px 18px;
            border-radius: 20px;
            box-sizing: border-box;
            color: white;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        
        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
        }
        
        .control-row input {
            width: 60%;
            accent-color: #007aff;
        }
        
        #status {
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.9);
            text-align: center;
            background: rgba(0,0,0,0.4);
            padding: 4px 12px;
            border-radius: 10px;
        }

        .tip-jar {
            font-size: 12px;
            color: #aaa;
            margin-top: 15px;
            line-height: 1.5;
        }
    </style>
    
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>

    <!-- 起動画面 -->
    <div id="overlay">
        <h2>360° VR EXR Viewer</h2>
        <p class="tip-jar">
            【最重要・全画面化の手順】<br>
            iPhoneのSafariでこのページを開き、下部の<strong>「共有ボタン（上矢印のアイコン）」</strong>をタップして、<strong>「ホーム画面に追加」</strong>を行ってください。<br>
            追加されたホーム画面のアイコンから起動すると、アドレスバーが消え、完全な全画面VRになります。
        </p>
        <button class="btn" id="start-btn">VRモードを開始</button>
    </div>

    <!-- センターガイドライン -->
    <div id="center-line"></div>

    <!-- UIパネル -->
    <div id="ui-panel" style="display: none; opacity: 0;">
        <label class="file-label" for="file-input">
            📸 .exr パノラマ画像を選択
        </label>
        <input type="file" id="file-input" accept=".exr">
        
        <div class="control-box">
            <div class="control-row">
                <label for="ipd">目の間隔 (IPD)</label>
                <input type="range" id="ipd" min="0" max="4" step="0.1" value="1.0">
            </div>
            <div class="control-row">
                <label for="exposure">露出 (Brightness)</label>
                <input type="range" id="exposure" min="0.1" max="4.0" step="0.1" value="1.0">
            </div>
        </div>
        
        <div id="status">画面タップでUIの表示/非表示を切り替え</div>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { EXRLoader } from 'three/addons/loaders/EXRLoader.js';

        let scene, renderer, sphereMaterial, sphere;
        let cameraRig, cameraLeft, cameraRight;
        let deviceOrientation = { alpha: 0, beta: 0, gamma: 0 };
        let screenOrientation = 0;
        let isGyroEnabled = false;
        
        let ipd = 1.0; 
        let uiTimeout;

        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('start-btn');
        const centerLine = document.getElementById('center-line');
        const uiPanel = document.getElementById('ui-panel');
        const fileInput = document.getElementById('file-input');
        const statusText = document.getElementById('status');
        const exposureInput = document.getElementById('exposure');
        const ipdInput = document.getElementById('ipd');
        const container = document.getElementById('canvas-container');

        function initThree() {
            scene = new THREE.Scene();
            
            cameraRig = new THREE.Group();
            scene.add(cameraRig);

            // 初期サイズ取得（アドレスバーを除いた純粋な領域）
            const width = window.innerWidth;
            const height = window.innerHeight;
            const aspect = (width / 2) / height;

            cameraLeft = new THREE.PerspectiveCamera(75, aspect, 0.1, 1000);
            cameraRight = new THREE.PerspectiveCamera(75, aspect, 0.1, 1000);
            
            updateCameraPositions();
            
            cameraRig.add(cameraLeft);
            cameraRig.add(cameraRight);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            
            container.appendChild(renderer.domElement);

            const geometry = new THREE.SphereGeometry(60, 60, 40);
            geometry.scale(-1, 1, 1);

            sphereMaterial = new THREE.MeshBasicMaterial({ color: 0x1c1c24 });
            sphere = new THREE.Mesh(geometry, sphereMaterial);
            scene.add(sphere);

            // iOSの不規則な画面リサイズ（バーの伸縮）を監視
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('orientationchange', () => {
                setTimeout(onWindowResize, 200); // 回転アニメーションを待って再計算
            });
            
            exposureInput.addEventListener('input', (e) => {
                renderer.toneMappingExposure = parseFloat(e.target.value);
                resetUITimer();
            });

            ipdInput.addEventListener('input', (e) => {
                ipd = parseFloat(e.target.value);
                updateCameraPositions();
                resetUITimer();
            });

            container.addEventListener('click', () => {
                if (uiPanel.style.opacity === '0') {
                    showUI();
                } else {
                    hideUI();
                }
            });

            uiPanel.addEventListener('click', (e) => {
                e.stopPropagation();
                resetUITimer();
            });

            animate();
        }

        function updateCameraPositions() {
            const offset = ipd * 0.5;
            cameraLeft.position.set(-offset, 0, 0);
            cameraRight.position.set(offset, 0, 0);
        }

        function onWindowResize() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            const aspect = (width / 2) / height;

            cameraLeft.aspect = aspect;
            cameraLeft.updateProjectionMatrix();
            
            cameraRight.aspect = aspect;
            cameraRight.updateProjectionMatrix();
            
            renderer.setSize(width, height);
        }

        const zee = new THREE.Vector3(0, 0, 1);
        const euler = new THREE.Euler();
        const q0 = new THREE.Quaternion();
        const q1 = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5));

        function updateCameraOrientation() {
            if (!isGyroEnabled) return;

            const alpha = deviceOrientation.alpha ? THREE.MathUtils.degToRad(deviceOrientation.alpha) : 0;
            const beta = deviceOrientation.beta ? THREE.MathUtils.degToRad(deviceOrientation.beta) : 0;
            const gamma = deviceOrientation.gamma ? THREE.MathUtils.degToRad(deviceOrientation.gamma) : 0;
            const orient = screenOrientation ? THREE.MathUtils.degToRad(screenOrientation) : 0;

            euler.set(beta, alpha, -gamma, 'YXZ');
            cameraRig.quaternion.setFromEuler(euler);
            cameraRig.quaternion.multiply(q1);
            cameraRig.quaternion.multiply(q0.setFromAxisAngle(zee, -orient));
        }

        function animate() {
            requestAnimationFrame(animate);
            updateCameraOrientation();
            
            const width = window.innerWidth;
            const height = window.innerHeight;
            
            renderer.setScissorTest(true);
            
            renderer.setViewport(0, 0, width / 2, height);
            renderer.setScissor(0, 0, width / 2, height);
            renderer.render(scene, cameraLeft);
            
            renderer.setViewport(width / 2, 0, width / 2, height);
            renderer.setScissor(width / 2, 0, width / 2, height);
            renderer.render(scene, cameraRight);
        }

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            statusText.textContent = 'EXRデコード中...';
            resetUITimer();
            
            const objectURL = URL.createObjectURL(file);
            const loader = new EXRLoader();
            loader.setDataType(THREE.HalfFloatType); 
            
            loader.load(objectURL, function(texture) {
                texture.minFilter = THREE.LinearFilter;
                texture.magFilter = THREE.LinearFilter;
                texture.needsUpdate = true;

                sphereMaterial.map = texture;
                sphereMaterial.color.setHex(0xffffff);
                sphereMaterial.needsUpdate = true;
                
                statusText.textContent = `表示中: ${file.name}`;
                URL.revokeObjectURL(objectURL);
            }, 
            undefined, 
            function(error) {
                console.error(error);
                statusText.textContent = 'エラー: EXRの解析に失敗しました。';
                URL.revokeObjectURL(objectURL);
            });
        });

        function hideUI() {
            uiPanel.style.opacity = '0';
            uiPanel.style.pointerEvents = 'none';
        }

        function showUI() {
            uiPanel.style.opacity = '1';
            uiPanel.style.pointerEvents = 'auto';
            resetUITimer();
        }

        function resetUITimer() {
            clearTimeout(uiTimeout);
            uiTimeout = setTimeout(hideUI, 3000);
        }

        function updateScreenOrientation() {
            screenOrientation = window.orientation || 0;
        }

        startBtn.addEventListener('click', async () => {
            initThree();

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        setupGyroListeners();
                    } else {
                        alert('センサーの権限が拒否されました。');
                    }
                } catch (error) {
                    console.error(error);
                    alert('エラー: HTTPS環境で実行してください。');
                }
            } else {
                setupGyroListeners();
            }

            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                centerLine.style.display = 'block';
                uiPanel.style.display = 'flex';
                uiPanel.offsetHeight; 
                showUI();
            }, 500);
        });

        function setupGyroListeners() {
            isGyroEnabled = true;
            window.addEventListener('deviceorientation', (event) => {
                deviceOrientation.alpha = event.alpha;
                deviceOrientation.beta = event.beta;
            deviceOrientation.gamma = event.gamma;
            }, false);

            window.addEventListener('orientationchange', updateScreenOrientation, false);
            updateScreenOrientation();
        }
    </script>
</body>
</html>
