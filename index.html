<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>360° Gyro EXR Viewer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.5s ease;
        }
        .btn {
            background: #007aff;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.4);
            margin-top: 20px;
        }
        #ui-panel {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 90%;
            max-width: 400px;
        }
        .file-label {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 14px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            text-align: center;
        }
        #file-input {
            display: none;
        }
        .control-box {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px 20px;
            border-radius: 20px;
            box-sizing: border-box;
            color: white;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
        }
        .control-row input {
            width: 65%;
            accent-color: #007aff;
        }
        #status {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
            text-align: center;
        }
    </style>
    
    <!-- ESモジュールを古いブラウザ等でも安定動作させるための Shim -->
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>

    <!-- 外部ライブラリのルート指定 (Import Map) -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>

    <div id="overlay">
        <h2>360° Gyro EXR Viewer</h2>
        <p>iPhoneのジャイロセンサーを利用して周囲を見渡せます。<br>アクセス権限を許可して開始してください。</p>
        <button class="btn" id="start-btn">ジャイロを許可して開始</button>
    </div>

    <div id="ui-panel" style="display: none;">
        <label class="file-label" for="file-input">
            📸 .exr パノラマ画像を選択
        </label>
        <input type="file" id="file-input" accept=".exr">
        
        <!-- HDRならではの明暗調整用UI -->
        <div class="control-box">
            <div class="control-row">
                <label for="exposure">露出 (Brightness)</label>
                <input type="range" id="exposure" min="0.1" max="4.0" step="0.1" value="1.0">
            </div>
        </div>
        
        <div id="status">.exrファイル（正距円筒図法）を選択してください。</div>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { EXRLoader } from 'three/addons/loaders/EXRLoader.js';

        let scene, camera, renderer;
        let deviceOrientation = { alpha: 0, beta: 0, gamma: 0 };
        let screenOrientation = 0;
        let isGyroEnabled = false;

        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('start-btn');
        const uiPanel = document.getElementById('ui-panel');
        const fileInput = document.getElementById('file-input');
        const statusText = document.getElementById('status');
        const exposureInput = document.getElementById('exposure');

        function initThree() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            
            // EXRの高輝度を綺麗に表現するためのトーンマッピング設定
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            
            container.appendChild(renderer.domElement);

            camera.position.set(0, 0, 0);

            window.addEventListener('resize', onWindowResize);
            
            // 露出スライダーの制御
            exposureInput.addEventListener('input', (e) => {
                renderer.toneMappingExposure = parseFloat(e.target.value);
            });

            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        const zee = new THREE.Vector3(0, 0, 1);
        const euler = new THREE.Euler();
        const q0 = new THREE.Quaternion();
        const q1 = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5));

        function updateCameraOrientation() {
            if (!isGyroEnabled) return;

            const alpha = deviceOrientation.alpha ? THREE.MathUtils.degToRad(deviceOrientation.alpha) : 0;
            const beta = deviceOrientation.beta ? THREE.MathUtils.degToRad(deviceOrientation.beta) : 0;
            const gamma = deviceOrientation.gamma ? THREE.MathUtils.degToRad(deviceOrientation.gamma) : 0;
            const orient = screenOrientation ? THREE.MathUtils.degToRad(screenOrientation) : 0;

            euler.set(beta, alpha, -gamma, 'YXZ');
            camera.quaternion.setFromEuler(euler);
            camera.quaternion.multiply(q1);
            camera.quaternion.multiply(q0.setFromAxisAngle(zee, -orient));
        }

        function animate() {
            requestAnimationFrame(animate);
            updateCameraOrientation();
            renderer.render(scene, camera);
        }

        // EXRファイルの読み込み・デコード処理
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            statusText.textContent = 'EXRデータをデコード中... (数秒かかります)';
            
            // ファイルをメモリ内の仮想URLに紐付け
            const objectURL = URL.createObjectURL(file);
            
            const loader = new EXRLoader();
            // モバイルのメモリ制限を考慮し、16bitハーフフロート形式で省メモリに展開
            loader.setDataType(THREE.HalfFloatType); 
            
            loader.load(objectURL, function(texture) {
                // 360度パノラマ（Equirectangular）用のアタッチメント設定
                texture.mapping = THREE.EquirectangularReflectionMapping;
                texture.minFilter = THREE.LinearFilter;
                texture.magFilter = THREE.LinearFilter;
                texture.needsUpdate = true;

                // シーンの背景（スカイボックス）として適用（これで球体オブジェクトが不要に）
                scene.background = texture;
                
                statusText.textContent = `表示中: ${file.name}`;
                
                // 読み込み完了後にオブジェクトURLを解放してメモリ漏れを防止
                URL.revokeObjectURL(objectURL);
            }, 
            undefined, 
            function(error) {
                console.error(error);
                statusText.textContent = 'エラー: EXRの解析に失敗しました。ファイル破損か非対応形式です。';
                URL.revokeObjectURL(objectURL);
            });
        });

        function updateScreenOrientation() {
            screenOrientation = window.orientation || 0;
        }

        startBtn.addEventListener('click', async () => {
            initThree();

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        setupGyroListeners();
                    } else {
                        alert('センサーへのアクセス権限が拒否されました。');
                    }
                } catch (error) {
                    console.error(error);
                    alert('エラー: HTTPS環境で実行してください。');
                }
            } else {
                setupGyroListeners();
            }

            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                uiPanel.style.display = 'flex';
            }, 500);
        });

        function setupGyroListeners() {
            isGyroEnabled = true;
            window.addEventListener('deviceorientation', (event) => {
                deviceOrientation.alpha = event.alpha;
                deviceOrientation.beta = event.beta;
                deviceOrientation.gamma = event.gamma;
            }, false);

            window.addEventListener('orientationchange', updateScreenOrientation, false);
            updateScreenOrientation();
        }
    </script>
</body>
</html>
