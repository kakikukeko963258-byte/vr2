<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>360° VR EXR + VR Video Viewer</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VR Viewer">

    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            position: fixed; background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-user-select: none; user-select: none;
        }
        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #css-container-left, #css-container-right {
            position: absolute; top: 0; width: 50vw; height: 100vh; overflow: hidden; pointer-events: auto; z-index: 2;
        }
        #css-container-left { left: 0; }
        #css-container-right { right: 0; }
        
        #center-line {
            position: absolute; top: 0; left: 50%; width: 1px; height: 100%;
            background: rgba(255, 255, 255, 0.2); z-index: 5; pointer-events: none; display: none;
        }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100;
            color: white; text-align: center; padding: 20px; box-sizing: border-box;
        }
        .btn {
            background: #007aff; color: white; border: none; padding: 14px 28px;
            font-size: 16px; font-weight: bold; border-radius: 12px; cursor: pointer; margin-top: 15px;
        }
        #ui-panel {
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); z-index: 10;
            display: flex; flex-direction: column; align-items: center; gap: 8px; width: 95%; max-width: 480px;
            transition: opacity 0.4s ease; pointer-events: auto;
        }
        .file-label {
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            color: white; border: 1px solid rgba(255, 255, 255, 0.3); padding: 6px 12px;
            border-radius: 20px; cursor: pointer; font-size: 11px; font-weight: 500; text-align: center;
        }
        .file-inputs-row { display: flex; gap: 8px; width: 100%; justify-content: center; }
        input[type="file"] { display: none; }
        .control-box {
            width: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2); padding: 10px 14px; border-radius: 16px;
            box-sizing: border-box; color: white; display: flex; flex-direction: column; gap: 8px;
        }
        .url-row { display: flex; gap: 6px; width: 100%; }
        #yt-url {
            flex: 1; background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.25);
            color: white; padding: 6px 10px; border-radius: 8px; font-size: 12px;
        }
        #yt-load-btn { background: #34c759; color: white; border: none; padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: bold; }
        
        .btn-row { display: flex; gap: 6px; width: 100%; flex-wrap: wrap; }
        .btn-row button { flex: 1; min-width: 80px; color: white; border: none; padding: 8px 4px; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; }
        #vid-play-btn { background: #007aff; }
        #vid-pause-btn { background: #ff3b30; }
        #vid-sync-slower-btn { background: #5856d6; }
        #vid-recenter-btn { background: #ff9500; }
        
        .sliders-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; width: 100%; }
        .slider-item { display: flex; align-items: center; justify-content: space-between; font-size: 11px; gap: 4px; }
        .slider-item label { width: 50px; color: #ccc; shrink: 0; }
        .slider-item input[type="range"] { flex: 1; accent-color: #007aff; margin: 0; min-width: 0; }
        
        /* ★ 追加: 数値入力ボックス用のスタイル */
        .num-input {
            width: 38px; background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; border-radius: 4px; font-size: 11px; text-align: center; padding: 2px 0;
            font-family: monospace;
        }
        .num-input:focus { border-color: #007aff; outline: none; }

        #status { color: rgba(255, 255, 255, 0.8); font-size: 11px; text-align: center; min-height: 14px; }
    </style>
    
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>

    <div id="overlay">
        <h2>360° VR EXR + Video Viewer</h2>
        <button class="btn" id="start-btn">VRモードを開始</button>
    </div>

    <div id="center-line"></div>
    <div id="css-container-left"></div>
    <div id="css-container-right"></div>

    <div id="ui-panel" style="display: none; opacity: 0;">
        <div class="control-box">
            <div class="url-row">
                <input type="text" id="yt-url" placeholder="YouTube動画のURL" value="https://www.youtube.com/watch?v=dQw4w9WgXcQ">
                <button id="yt-load-btn">YouTube読込</button>
            </div>
            
            <div class="btn-row">
                <button id="vid-play-btn">▶ 同時再生</button>
                <button id="vid-pause-btn">❚❚ 同時停止</button>
                <button id="vid-sync-slower-btn">⏳ 遅い方に同期</button>
                <button id="vid-recenter-btn">🎯 正面配置</button>
            </div>
            
            <div class="sliders-grid">
                <div class="slider-item"><label>画面距離</label><input type="range" id="yt-dist" min="10" max="100" value="35"></div>
                <div class="slider-item"><label>画面サイズ</label><input type="range" id="yt-size" min="0.2" max="4.0" step="0.1" value="1.5"></div>
                
                <!-- ★ 変更点: 目間隔の横に入力ボックスを追加 -->
                <div class="slider-item">
                    <label>目間隔</label>
                    <input type="range" id="ipd" min="0" max="16" step="0.1" value="1.0">
                    <input type="number" id="ipd-num" min="0" max="16" step="0.1" value="1.0" class="num-input">
                </div>
                
                <div class="slider-item"><label>背景露出</label><input type="range" id="exposure" min="0.1" max="4.0" step="0.1" value="1.0"></div>
            </div>

            <div id="status">動画ファイルを読み込むと、スマホでも確実に100%同期再生できます。</div>
            
            <div class="file-inputs-row">
                <label class="file-label" for="video-input">🎞️ 動画ファイルを選択</label>
                <input type="file" id="video-input" accept="video/*">
                
                <label class="file-label" for="file-input">📸 背景 .exr 選択</label>
                <input type="file" id="file-input" accept=".exr">
            </div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <video id="local-video" loop playsinline webkit-playsinline crossOrigin="anonymous" style="display:none;"></video>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script type="module">
        import * as THREE from 'three';
        import { EXRLoader } from 'three/addons/loaders/EXRLoader.js';
        import { CSS3DRenderer, CSS3DObject } from 'three/addons/renderers/CSS3DRenderer.js';

        let scene, renderer, sphereMaterial, sphere;
        let cameraRig, cameraLeft, cameraRight;
        let cssRendererLeft, cssRendererRight;
        let sceneCSSLeft, sceneCSSRight;
        let screenLeftObj, screenRightObj; 
        
        let videoElement, videoTexture, videoMeshLeft, videoMeshRight;
        let isLocalVideoMode = false;

        let playerLeft = null, playerRight = null;
        let deviceOrientation = { alpha: 0, beta: 0, gamma: 0 };
        let screenOrientation = 0;
        let isGyroEnabled = false;
        
        let ipd = 1.0; 
        let ytDistance = 35;
        let ytScaleFactor = 1.5;
        const baseScale = 0.02; 
        let uiTimeout;

        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('start-btn');
        const centerLine = document.getElementById('center-line');
        const uiPanel = document.getElementById('ui-panel');
        const fileInput = document.getElementById('file-input');
        const videoInput = document.getElementById('video-input');
        const statusText = document.getElementById('status');
        const container = document.getElementById('canvas-container');
        videoElement = document.getElementById('local-video');
        
        const exposureInput = document.getElementById('exposure');
        const ipdInput = document.getElementById('ipd');
        const ipdNumInput = document.getElementById('ipd-num'); // ★ 追加
        const ytDistInput = document.getElementById('yt-dist');
        const ytSizeInput = document.getElementById('yt-size');
        const ytUrlInput = document.getElementById('yt-url');
        const ytLoadBtn = document.getElementById('yt-load-btn');
        const vidPlayBtn = document.getElementById('vid-play-btn');
        const vidPauseBtn = document.getElementById('vid-pause-btn');
        const vidSyncSlowerBtn = document.getElementById('vid-sync-slower-btn');
        const vidRecenterBtn = document.getElementById('vid-recenter-btn');

        function initThree() {
            scene = new THREE.Scene();
            cameraRig = new THREE.Group();
            scene.add(cameraRig);

            const width = window.innerWidth;
            const height = window.innerHeight;
            const aspect = (width / 2) / height;

            cameraLeft = new THREE.PerspectiveCamera(75, aspect, 0.1, 1000);
            cameraRight = new THREE.PerspectiveCamera(75, aspect, 0.1, 1000);
            updateCameraPositions();
            cameraRig.add(cameraLeft);
            cameraRig.add(cameraRight);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            container.appendChild(renderer.domElement);

            const geometry = new THREE.SphereGeometry(80, 60, 40);
            geometry.scale(-1, 1, 1);
            sphereMaterial = new THREE.MeshBasicMaterial({ color: 0x1c1c24 });
            sphere = new THREE.Mesh(geometry, sphereMaterial);
            scene.add(sphere);

            sceneCSSLeft = new THREE.Scene();
            sceneCSSRight = new THREE.Scene();

            cssRendererLeft = new CSS3DRenderer();
            cssRendererLeft.setSize(width / 2, height);
            document.getElementById('css-container-left').appendChild(cssRendererLeft.domElement);

            cssRendererRight = new CSS3DRenderer();
            cssRendererRight.setSize(width / 2, height);
            document.getElementById('css-container-right').appendChild(cssRendererRight.domElement);

            window.addEventListener('resize', onWindowResize);
            setupUIEventListeners();
            
            loadYouTubeVideo();
            animate();
        }

        function setupUIEventListeners() {
            exposureInput.addEventListener('input', (e) => { renderer.toneMappingExposure = parseFloat(e.target.value); resetUITimer(); });
            ytDistInput.addEventListener('input', (e) => { ytDistance = parseFloat(e.target.value); updateScreensTransform(); resetUITimer(); });
            ytSizeInput.addEventListener('input', (e) => { ytScaleFactor = parseFloat(e.target.value); updateScreensTransform(); resetUITimer(); });

            // ★ 変更点: 目間隔スライダー操作時に数値入力も連動させる
            ipdInput.addEventListener('input', (e) => {
                ipd = parseFloat(e.target.value);
                ipdNumInput.value = ipd.toFixed(1);
                updateCameraPositions();
                resetUITimer();
            });

            // ★ 変更点: 数値入力ボックス直接変更時の連動とバリデーション
            ipdNumInput.addEventListener('input', (e) => {
                let val = parseFloat(e.target.value);
                if (isNaN(val)) return;
                
                // min/maxを超えないようクリップ
                if (val < 0) val = 0;
                if (val > 16) val = 16;
                
                ipd = val;
                ipdInput.value = val;
                updateCameraPositions();
                resetUITimer();
            });

            ytLoadBtn.addEventListener('click', () => {
                isLocalVideoMode = false;
                videoElement.pause();
                if(videoMeshLeft) { scene.remove(videoMeshLeft); scene.remove(videoMeshRight); }
                loadYouTubeVideo();
                resetUITimer();
            });

            vidPlayBtn.addEventListener('click', () => {
                if (isLocalVideoMode) {
                    videoElement.play().catch(err => console.log(err));
                    statusText.textContent = "ローカル動画を同期再生中...";
                } else {
                    if (playerRight && playerRight.mute) playerRight.mute(); 
                    if (playerLeft && playerLeft.playVideo) playerLeft.playVideo();
                    setTimeout(() => {
                        if (playerRight && playerRight.playVideo) playerRight.playVideo();
                    }, 150);
                    statusText.textContent = "YouTubeを再生開始";
                }
                resetUITimer();
            });

            vidPauseBtn.addEventListener('click', () => {
                if (isLocalVideoMode) {
                    videoElement.pause();
                } else {
                    if (playerLeft && playerLeft.pauseVideo) playerLeft.pauseVideo();
                    if (playerRight && playerRight.pauseVideo) playerRight.pauseVideo();
                }
                statusText.textContent = "一時停止しました。";
                resetUITimer();
            });

            vidSyncSlowerBtn.addEventListener('click', () => {
                if (isLocalVideoMode) {
                    statusText.textContent = "ローカル動画は完全に同期しています。";
                } else {
                    if (playerLeft && playerRight && typeof playerLeft.getCurrentTime === 'function' && typeof playerRight.getCurrentTime === 'function') {
                        const tLeft = playerLeft.getCurrentTime();
                        const tRight = playerRight.getCurrentTime();
                        const slowerTime = Math.min(tLeft, tRight);
                        playerLeft.seekTo(slowerTime, true);
                        playerRight.seekTo(slowerTime, true);
                        statusText.textContent = `遅い方の時間 (${slowerTime.toFixed(2)}秒) に合わせました。`;
                    } else {
                        statusText.textContent = "プレイヤーが準備できていません。";
                    }
                }
                resetUITimer();
            });

            vidRecenterBtn.addEventListener('click', () => { recenterScreens(); resetUITimer(); });
            uiPanel.addEventListener('click', (e) => { e.stopPropagation(); resetUITimer(); });

            videoInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;

                isLocalVideoMode = true;
                statusText.textContent = "動画ファイルを読み込み中...";

                if (screenLeftObj) sceneCSSLeft.remove(screenLeftObj);
                if (screenRightObj) sceneCSSRight.remove(screenRightObj);
                playerLeft = null; playerRight = null;

                const fileURL = URL.createObjectURL(file);
                videoElement.src = fileURL;
                videoElement.load();

                videoTexture = new THREE.VideoTexture(videoElement);
                videoTexture.minFilter = THREE.LinearFilter;
                videoTexture.magFilter = THREE.LinearFilter;
                videoTexture.colorSpace = THREE.SRGBColorSpace;

                const movieGeo = new THREE.PlaneGeometry(16, 9);
                const movieMat = new THREE.MeshBasicMaterial({ map: videoTexture, side: THREE.DoubleSide });

                if(videoMeshLeft) { scene.remove(videoMeshLeft); scene.remove(videoMeshRight); }
                videoMeshLeft = new THREE.Mesh(movieGeo, movieMat);
                videoMeshRight = new THREE.Mesh(movieGeo, movieMat);

                videoMeshLeft.layers.set(1);
                videoMeshRight.layers.set(2);

                scene.add(videoMeshLeft);
                scene.add(videoMeshRight);

                recenterScreens();
                statusText.textContent = "動画ファイルを読み込みました。";
            });
        }

        function updateCameraPositions() {
            const offset = ipd * 0.5;
            cameraLeft.position.set(-offset, 0, 0);
            cameraRight.position.set(offset, 0, 0);
            
            cameraLeft.layers.enable(0);  
            cameraLeft.layers.enable(1);  
            cameraRight.layers.enable(0); 
            cameraRight.layers.enable(2); 
        }

        function extractVideoId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function loadYouTubeVideo() {
            const id = extractVideoId(ytUrlInput.value);
            if (!id) { statusText.textContent = "エラー: 正しいYouTubeのURLを入力してください。"; return; }

            statusText.textContent = "YouTube動画を初期化中...";
            if (screenLeftObj) sceneCSSLeft.remove(screenLeftObj);
            if (screenRightObj) sceneCSSRight.remove(screenRightObj);

            const createIframe = (domId) => {
                const iframe = document.createElement('iframe');
                iframe.id = domId; iframe.width = "640"; iframe.height = "360";
                iframe.src = `https://www.youtube.com/embed/${id}?enablejsapi=1&controls=1&cc_load_policy=0&rel=0&playsinline=1&origin=${window.location.origin}`;
                iframe.style.border = "none"; iframe.style.backgroundColor = "#000";
                return iframe;
            };

            const elLeft = createIframe('yt-frame-left');
            const elRight = createIframe('yt-frame-right');

            screenLeftObj = new CSS3DObject(elLeft);
            screenRightObj = new CSS3DObject(elRight);

            sceneCSSLeft.add(screenLeftObj);
            sceneCSSRight.add(screenRightObj);

            recenterScreens();

            if (typeof YT !== 'undefined' && YT.Player) {
                setTimeout(() => {
                    playerLeft = new YT.Player(elLeft, {
                        events: { 'onReady': () => { statusText.textContent = "YouTube準備完了（標準UI・字幕初期オフ）"; } }
                    });
                    playerRight = new YT.Player(elRight);
                }, 500);
            }
        }

        function updateScreensTransform() {
            const scale = (isLocalVideoMode ? 0.15 : baseScale) * ytScaleFactor;

            if (isLocalVideoMode && videoMeshLeft) {
                videoMeshLeft.scale.set(scale, scale, scale);
                videoMeshRight.scale.set(scale, scale, scale);
                let dir = videoMeshLeft.position.clone().normalize();
                if (dir.lengthSq() === 0) dir.set(0, 0, -1);
                const targetPos = dir.multiplyScalar(ytDistance);
                videoMeshLeft.position.copy(targetPos);
                videoMeshRight.position.copy(targetPos);
            } else if (screenLeftObj && screenRightObj) {
                screenLeftObj.scale.set(scale, scale, scale);
                screenRightObj.scale.set(scale, scale, scale);
                let dir = screenLeftObj.position.clone().normalize();
                if (dir.lengthSq() === 0) dir.set(0, 0, -1);
                const targetPos = dir.multiplyScalar(ytDistance);
                screenLeftObj.position.copy(targetPos);
                screenRightObj.position.copy(targetPos);
            }
        }

        function recenterScreens() {
            const dir = new THREE.Vector3(0, 0, -1);
            if (cameraRig) dir.applyQuaternion(cameraRig.quaternion);
            dir.normalize();
            const targetPos = dir.clone().multiplyScalar(ytDistance);

            if (isLocalVideoMode && videoMeshLeft) {
                videoMeshLeft.position.copy(targetPos);
                videoMeshRight.position.copy(targetPos);
                videoMeshLeft.lookAt(0, 0, 0);
                videoMeshRight.lookAt(0, 0, 0);
            } else if (screenLeftObj && screenRightObj) {
                screenLeftObj.position.copy(targetPos);
                screenRightObj.position.copy(targetPos);
                screenLeftObj.lookAt(0, 0, 0);
                screenRightObj.lookAt(0, 0, 0);
            }
            updateScreensTransform();
        }

        function onWindowResize() {
            const width = window.innerWidth; const height = window.innerHeight;
            const aspect = (width / 2) / height;
            cameraLeft.aspect = aspect; cameraLeft.updateProjectionMatrix();
            cameraRight.aspect = aspect; cameraRight.updateProjectionMatrix();
            renderer.setSize(width, height);
            cssRendererLeft.setSize(width / 2, height);
            cssRendererRight.setSize(width / 2, height);
        }

        const zee = new THREE.Vector3(0, 0, 1);
        const euler = new THREE.Euler();
        const q0 = new THREE.Quaternion();
        const q1 = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5));

        function updateCameraOrientation() {
            if (!isGyroEnabled) return;
            const alpha = deviceOrientation.alpha ? THREE.MathUtils.degToRad(deviceOrientation.alpha) : 0;
            const beta = deviceOrientation.beta ? THREE.MathUtils.degToRad(deviceOrientation.beta) : 0;
            const gamma = deviceOrientation.gamma ? THREE.MathUtils.degToRad(deviceOrientation.gamma) : 0;
            const orient = screenOrientation ? THREE.MathUtils.degToRad(screenOrientation) : 0;

            euler.set(beta, alpha, -gamma, 'YXZ');
            cameraRig.quaternion.setFromEuler(euler);
            cameraRig.quaternion.multiply(q1);
            cameraRig.quaternion.multiply(q0.setFromAxisAngle(zee, -orient));
        }

        function animate() {
            requestAnimationFrame(animate);
            updateCameraOrientation();
            
            const width = window.innerWidth;
            const height = window.innerHeight;
            renderer.setScissorTest(true);
            
            renderer.setViewport(0, 0, width / 2, height);
            renderer.setScissor(0, 0, width / 2, height);
            renderer.render(scene, cameraLeft);
            if (!isLocalVideoMode) cssRendererLeft.render(sceneCSSLeft, cameraLeft);
            
            renderer.setViewport(width / 2, 0, width / 2, height);
            renderer.setScissor(width / 2, 0, width / 2, height);
            renderer.render(scene, cameraRight);
            if (!isLocalVideoMode) cssRendererRight.render(sceneCSSRight, cameraRight);
        }

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file) return;
            statusText.textContent = 'EXRデコード中...'; resetUITimer();
            const objectURL = URL.createObjectURL(file);
            const loader = new EXRLoader();
            loader.setDataType(THREE.HalfFloatType); 
            loader.load(objectURL, function(texture) {
                texture.minFilter = THREE.LinearFilter; texture.magFilter = THREE.LinearFilter; texture.needsUpdate = true;
                sphereMaterial.map = texture; sphereMaterial.color.setHex(0xffffff); sphereMaterial.needsUpdate = true;
                statusText.textContent = `背景変更完了: ${file.name}`;
                URL.revokeObjectURL(objectURL);
            }, undefined, function(error) {
                statusText.textContent = 'エラー: EXRの解析に失敗しました。';
                URL.revokeObjectURL(objectURL);
            });
        });

        function hideUI() { uiPanel.style.opacity = '0'; uiPanel.style.pointerEvents = 'none'; }
        function showUI() { uiPanel.style.opacity = '1'; uiPanel.style.pointerEvents = 'auto'; resetUITimer(); }
        function resetUITimer() { clearTimeout(uiTimeout); uiTimeout = setTimeout(hideUI, 8000); }

        startBtn.addEventListener('click', async () => {
            initThree();
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') setupGyroListeners();
                } catch (error) { alert('センサーの権限が拒否されました。'); }
            } else { setupGyroListeners(); }

            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none'; centerLine.style.display = 'block';
                uiPanel.style.display = 'flex'; uiPanel.offsetHeight; showUI();
            }, 500);
        });

        function setupGyroListeners() {
            isGyroEnabled = true;
            window.addEventListener('deviceorientation', (e) => {
                deviceOrientation.alpha = e.alpha; deviceOrientation.beta = e.beta; deviceOrientation.gamma = e.gamma;
            }, false);
            window.addEventListener('orientationchange', () => { screenOrientation = window.orientation || 0; }, false);
        }
    </script>
</body>
</html>
