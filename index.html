<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>360° Gyro HDRI Viewer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.5s ease;
        }
        .btn {
            background: #007aff;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.4);
            margin-top: 20px;
            -webkit-appearance: none;
        }
        .btn:active {
            background: #0056b3;
        }
        #ui-panel {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 90%;
            max-width: 400px;
        }
        .file-label {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 14px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            text-align: center;
        }
        #file-input {
            display: none;
        }
        #status {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
            text-align: center;
        }
    </style>
    <!-- Three.js (軽量なWebGLライブラリをCDN経由で読み込み) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <!-- 起動画面（iOSのセキュリティ制限を解除するためのタップ対象） -->
    <div id="overlay">
        <h2>360° Gyro Viewer</h2>
        <p>iPhoneのジャイロセンサーを利用して周囲を見渡せます。<br>アクセス権限を許可して開始してください。</p>
        <button class="btn" id="start-btn">ジャイロを許可して開始</button>
    </div>

    <!-- 画像選択用のUI -->
    <div id="ui-panel" style="display: none;">
        <label class="file-label" for="file-input">
            📸 パノラマ画像（HDRI）を選択
        </label>
        <input type="file" id="file-input" accept="image/*">
        <div id="status">画像が未選択です。端末内の360度画像を選択してください。</div>
    </div>

    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, sphereMaterial, sphere;
        let deviceOrientation = { alpha: 0, beta: 0, gamma: 0 };
        let screenOrientation = 0;
        let isGyroEnabled = false;

        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('start-btn');
        const uiPanel = document.getElementById('ui-panel');
        const fileInput = document.getElementById('file-input');
        const statusText = document.getElementById('status');

        // 3D空間の初期化
        function initThree() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            // 内側を向いた球体（ここに360度パノラマを貼り付ける）
            const geometry = new THREE.SphereGeometry(500, 60, 40);
            geometry.scale(-1, 1, 1); // 反転させて内側を描画

            // 初期状態のダミーマテリアル
            sphereMaterial = new THREE.MeshBasicMaterial({ color: 0x1c1c24 });
            sphere = new THREE.Mesh(geometry, sphereMaterial);
            scene.add(sphere);

            camera.position.set(0, 0, 0);

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ジャイロの回転角度をThree.jsのカメラ（Quaternion）にシームレスに変換する
        const zee = new THREE.Vector3(0, 0, 1);
        const euler = new THREE.Euler();
        const q0 = new THREE.Quaternion();
        const q1 = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5)); // 基準軸を水平に補正 (-PI/2 around X)

        function updateCameraOrientation() {
            if (!isGyroEnabled) return;

            const alpha = deviceOrientation.alpha ? THREE.MathUtils.degToRad(deviceOrientation.alpha) : 0;
            const beta = deviceOrientation.beta ? THREE.MathUtils.degToRad(deviceOrientation.beta) : 0;
            const gamma = deviceOrientation.gamma ? THREE.MathUtils.degToRad(deviceOrientation.gamma) : 0;
            const orient = screenOrientation ? THREE.MathUtils.degToRad(screenOrientation) : 0;

            // 回転順序を'YXZ'に固定し、スマホの傾きを空間にマッピング
            euler.set(beta, alpha, -gamma, 'YXZ');
            camera.quaternion.setFromEuler(euler);
            camera.quaternion.multiply(q1); // 正面向きのフィッティング
            camera.quaternion.multiply(q0.setFromAxisAngle(zee, -orient)); // 画面の縦横持ち変更に対応
        }

        function animate() {
            requestAnimationFrame(animate);
            updateCameraOrientation();
            renderer.render(scene, camera);
        }

        // ユーザーがローカルの画像ファイルを選択した時の処理
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            statusText.textContent = '読み込み中...';
            const reader = new FileReader();
            
            reader.onload = function(event) {
                const loader = new THREE.TextureLoader();
                loader.load(event.target.result, function(texture) {
                    texture.minFilter = THREE.LinearFilter;
                    sphereMaterial.map = texture;
                    sphereMaterial.color.setHex(0xffffff); // ダミーカラーの初期化
                    sphereMaterial.needsUpdate = true;
                    statusText.textContent = `表示中: ${file.name}`;
                }, undefined, function() {
                    statusText.textContent = 'エラー: 画像テクスチャの生成に失敗しました。';
                });
            };
            
            reader.readAsDataURL(file);
        });

        function updateScreenOrientation() {
            screenOrientation = window.orientation || 0;
        }

        // ユーザー開始ボタンタップ時の権限要求
        startBtn.addEventListener('click', async () => {
            initThree();

            // iOS 13+ 特有の DeviceOrientationEvent 権限要求
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        setupGyroListeners();
                    } else {
                        alert('センサーへのアクセス権限が拒否されました。設定 ＞ Safari から権限をクリアしてください。');
                    }
                } catch (error) {
                    console.error(error);
                    alert('エラー: HTTPS接続が確立されていないか、未対応の環境です。');
                }
            } else {
                // 通常のブラウザ（AndroidやPC等）
                setupGyroListeners();
            }

            // オーバーレイ画面をフェードアウト
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                uiPanel.style.display = 'flex';
            }, 500);
        });

        function setupGyroListeners() {
            isGyroEnabled = true;
            window.addEventListener('deviceorientation', (event) => {
                deviceOrientation.alpha = event.alpha;
                deviceOrientation.beta = event.beta;
                deviceOrientation.gamma = event.gamma;
            }, false);

            window.addEventListener('orientationchange', updateScreenOrientation, false);
            updateScreenOrientation();
        }
    </script>
</body>
</html>
